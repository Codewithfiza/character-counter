<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TypeCount — Character Counter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="paper-texture"></div>

  <!-- Decorative lines -->
  <div class="deco-lines">
    <span></span><span></span><span></span>
  </div>

  <div class="scene">
    <div class="card" id="card">

      <!-- Header -->
      <div class="card-header">
        <div class="header-top">
          <span class="issue-label">Issue No. 001</span>
          <span class="date-label" id="dateLabel"></span>
        </div>
        <h1 class="title">TypeCount</h1>
        <p class="subtitle">— A character counter for the written word —</p>
        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-icon">✦</span>
          <span class="divider-line"></span>
        </div>
      </div>

      <!-- Textarea -->
      <div class="textarea-wrapper">
        <textarea
          id="textInput"
          class="text-input"
          placeholder="Start typing your text here..."
          spellcheck="true"
        ></textarea>
        <div class="textarea-corner tl"></div>
        <div class="textarea-corner tr"></div>
        <div class="textarea-corner bl"></div>
        <div class="textarea-corner br"></div>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-number" id="charCount">0</span>
          <span class="stat-label">Characters</span>
        </div>
        <div class="stat-divider">|</div>
        <div class="stat-box">
          <span class="stat-number" id="lineCount">0</span>
          <span class="stat-label">Lines</span>
        </div>
      </div>

      <!-- Progress bar -->
      <!-- <div class="progress-section">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div> 
        <span class="progress-label" id="progressLabel">Just getting started...</span>
      </div> -->

      <!-- Clear button -->
      <button class="clear-btn" id="clearBtn">
        <span class="clear-icon">✕</span>
        <span>Clear Text</span>
      </button>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
